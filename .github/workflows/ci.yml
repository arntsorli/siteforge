name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  api-static:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .\apps\api[dev]
      - run: python -m pytest apps/api/tests
      - run: ruff check apps/api

